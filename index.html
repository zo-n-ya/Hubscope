<!doctype html>

<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>HubScope</title>

  <style>
    :root{
      --glass-bg: rgba(255,255,255,0.38);
      --glass-bg-strong: rgba(255,255,255,0.55);
      --glass-border: rgba(255,255,255,0.45);
      --text-dark: #1f2937;
      --text-muted: #6b7280;
      --accent: #f59e0b;
      --radius-lg: 28px;
      --radius-md: 20px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background:
        radial-gradient(600px 600px at 70% 20%, #ffd8b1 0%, transparent 60%),
        radial-gradient(500px 500px at 20% 80%, #ffe7cc 0%, transparent 60%),
        linear-gradient(180deg, #f5f5f4, #e7e5e4);
      color: var(--text-dark);
    }

    .nav{
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(20px);
      background: rgba(255,255,255,0.55);
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }

    .nav-inner{
      max-width: 1240px;
      margin: auto;
      padding: 14px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 700;
    }

    .wrap{
      max-width: 1240px;
      margin: auto;
      padding: 28px 22px 70px;
    }

    .hero{
      display:flex;
      justify-content: space-between;
      align-items:flex-end;
      gap: 16px;
      margin-bottom: 18px;
    }

    .hero h1{
      margin:0;
      font-size: 34px;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
    }

    .card{
      background: var(--glass-bg);
      backdrop-filter: blur(26px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding:20px;
    }

    input, textarea{
      width:100%;
      margin-top:8px;
      padding:12px;
      border-radius:10px;
      border:none;
    }

    .btn{
      margin-top:12px;
      padding:10px 14px;
      border:none;
      border-radius:999px;
      cursor:pointer;
    }

    .primary{background:#f59e0b;}
  </style>

</head>

<body>

<div class="wrap">
  <h1>HubScope</h1>

  <div class="grid">

```
<!-- Tool A -->
<div class="card">
  <h3>Tool A · Region Summary</h3>
  <p style="color:#666;font-size:13px;">
    Each line contains a region and a batch reference.
  </p>

  <form method="POST">
    <input type="hidden" name="tool" value="A"/>

    <label>Username</label>
    <input id="a_user" name="username" placeholder="your username">

    <label>Password</label>
    <input id="a_pass" name="password" type="password">

    <label>Input</label>
    <textarea name="text" placeholder="MIA BATCH-xxxx&#10;SJC BATCH-xxxx"></textarea>

    <button class="btn primary" type="submit" onclick="saveA()">Generate</button>
  </form>
</div>

<!-- Tool B -->
<div class="card">
  <h3>Tool B · Aggregation</h3>
  <p style="color:#666;font-size:13px;">
    Enter multiple batch references separated by commas.
  </p>

  <form method="POST">
    <input type="hidden" name="tool" value="B"/>

    <label>Username</label>
    <input id="b_user" name="username_b" placeholder="your username">

    <label>Password</label>
    <input id="b_pass" name="password_b" type="password">

    <label>Batch Reference(s)</label>
    <input name="atsubs" placeholder="BATCH-1,BATCH-2,BATCH-3">

    <button class="btn primary" type="submit" onclick="saveB()">Generate</button>
  </form>
</div>
```

  </div>

  <p style="margin-top:20px;color:#888;font-size:12px;">
    Public demo version · credentials are not stored
  </p>

</div>

<script>
function saveA(){
  localStorage.setItem("A", JSON.stringify({
    username: document.getElementById("a_user").value
  }));
}

function saveB(){
  localStorage.setItem("B", JSON.stringify({
    username: document.getElementById("b_user").value
  }));
}

window.addEventListener("load", function(){
  const a = JSON.parse(localStorage.getItem("A") || "{}");
  const b = JSON.parse(localStorage.getItem("B") || "{}");

  if(a.username) document.getElementById("a_user").value = a.username;
  if(b.username) document.getElementById("b_user").value = b.username;
});
</script>

</body>
</html>
